# Example experiment config exercising the YAML loader end-to-end.
#
# Shape: mode=optimize, multi-source node pair, user-supplied param space,
# iperf3 client/server extra_args, both SMP and JSON6902 patches, custom
# output path. Consumed by tests/test_experiment.py.
mode: optimize
nodes:
  sources: [kmain07, kmain09]
  target: kmain08
  hardware_class: 10g
  namespace: default
  ip_family_policy: RequireDualStack
benchmark:
  duration: 30
  iterations: 3
  omit: 5
  parallel: 16
  modes: [tcp]
optimize:
  n_trials: 50
  n_sobol: 15
  apply_source: true
  param_space:
    - name: net.core.rmem_max
      param_type: int
      values: [4194304, 67108864]
    - name: net.ipv4.tcp_congestion_control
      param_type: choice
      values: [cubic, bbr]
iperf:
  client:
    extra_args: ["--bidir", "-Z"]
  server:
    extra_args: ["--forceflush"]
patches:
  - target:
      kind: Job
    patch:
      spec:
        template:
          spec:
            containers:
              - name: iperf3-client
                resources:
                  limits:
                    memory: "2Gi"
  - target:
      kind: Deployment
    patch:
      - op: add
        path: /spec/template/spec/hostNetwork
        value: true
output: out/results.jsonl
