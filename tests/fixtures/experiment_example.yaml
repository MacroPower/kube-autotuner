# Example experiment config exercising the YAML loader end-to-end.
#
# Shape: optimize subcommand, multi-source node pair, user-supplied
# param space, iperf3 client/server extraArgs, both SMP and JSON6902
# patches, custom output path. Consumed by tests/test_experiment.py.
nodes:
  sources: [kmain07, kmain09]
  target: kmain08
  hardwareClass: 10g
  namespace: default
  ipFamilyPolicy: RequireDualStack
benchmark:
  iterations: 3
optimize:
  nTrials: 50
  nSobol: 15
  applySource: true
  paramSpace:
    - name: net.core.rmem_max
      paramType: int
      values: [4194304, 67108864]
    - name: net.ipv4.tcp_congestion_control
      paramType: choice
      values: [cubic, bbr]
iperf:
  duration: 30
  omit: 5
  parallel: 16
  client:
    extraArgs: ["--bidir", "-Z"]
  server:
    extraArgs: ["--forceflush"]
patches:
  - target:
      kind: Job
    patch:
      spec:
        template:
          spec:
            containers:
              - name: iperf3-client
                resources:
                  limits:
                    memory: "2Gi"
  - target:
      kind: Deployment
    patch:
      - op: add
        path: /spec/template/spec/hostNetwork
        value: true
output: out/results
