# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

vars:
  CLUSTER_NAME: kube-autotuner-test
  # Talos-in-Docker needs rootful Docker (containers write host sysctls
  # and /dev/kmsg; rootless forbids it even under --privileged). Inline
  # before every docker/talosctl call to override any DOCKER_HOST already
  # exported in the shell.
  DOCKER_HOST: unix:///run/docker.sock

tasks:
  default:
    cmd: task -l

  bootstrap:
    desc: Prepare the devshell (sync venv + generate completions)
    deps: [completions]

  sync:
    desc: Sync the uv-managed virtualenv
    sources:
      - pyproject.toml
      - uv.lock
    generates:
      - .venv/pyvenv.cfg
    cmds:
      - uv sync --quiet

  fmt:
    desc: Format the codebase with ruff
    cmds:
      - ruff format .

  lint:
    desc: Lint with ruff (auto-fix)
    cmds:
      - ruff check --fix .

  lint:check:
    desc: Lint without auto-fix (CI mode)
    cmds:
      - ruff check .
      - ruff format --check .

  typecheck:
    desc: Type-check with ty
    cmds:
      - ty check

  test:
    desc: Run the pytest suite
    cmds:
      - uv run pytest

  test:integration:
    desc: Create Talos Docker cluster, run integration tests, destroy on exit
    deps: [cluster-up]
    env:
      KUBE_AUTOTUNER_SYSCTL_BACKEND: "talos"
      KUBE_AUTOTUNER_ALLOW_SYSCTL_SKIP: "1"
    cmds:
      - defer: {task: cluster-down}
      # --timeout=1800 overrides the 120s ini default: Talos applies
      # a sysctl via reboot (~30s each), so multi-step tests exceed
      # the unit-suite budget. --no-cov silences the useless
      # --cov-report=term-missing that addopts inherits.
      - uv run pytest tests/integration/ -m integration --no-cov -v -s --timeout=1800 {{.CLI_ARGS}}

  test:integration:keep:
    desc: Same as test:integration but keep the cluster for iteration
    deps: [cluster-up]
    env:
      KUBE_AUTOTUNER_SYSCTL_BACKEND: "talos"
      KUBE_AUTOTUNER_ALLOW_SYSCTL_SKIP: "1"
    cmds:
      - uv run pytest tests/integration/ -m integration --no-cov -v -s --timeout=1800 {{.CLI_ARGS}}

  cluster-up:
    desc: Create the Talos Docker test cluster
    status:
      - DOCKER_HOST={{.DOCKER_HOST}} sudo -E docker inspect {{.CLUSTER_NAME}}-controlplane-1 &>/dev/null
    preconditions:
      - sh: command -v talosctl
        msg: talosctl is required
      - sh: DOCKER_HOST={{.DOCKER_HOST}} sudo -E docker info &>/dev/null
        msg: Rootful Docker daemon must be reachable at {{.DOCKER_HOST}}
    cmds:
      - task: cluster-clean
      # 4 CPU / 4 GiB so iperf3 --parallel=16 + kubelet + etcd coexist
      # without dropping control sockets mid-run.
      - DOCKER_HOST={{.DOCKER_HOST}} sudo -E talosctl cluster create docker
          --name {{.CLUSTER_NAME}}
          --workers 1
          --cpus-controlplanes 4
          --cpus-workers 4
          --memory-controlplanes 4096
          --memory-workers 4096
      # talosctl cluster create runs under sudo -E so writes root-owned
      # state into ~/.talos and ~/.kube; chown back for user tooling.
      - sudo chown -R $(id -u):$(id -g) {{.HOME}}/.talos {{.HOME}}/.kube
      # Refresh the sudo ticket so conftest.py's `sudo -n docker inspect`
      # calls don't hit a stale timestamp mid-run.
      - sudo -v

  cluster-down:
    desc: Destroy the Talos Docker test cluster
    cmds:
      - DOCKER_HOST={{.DOCKER_HOST}} sudo -E talosctl cluster destroy --name {{.CLUSTER_NAME}}
    ignore_error: true

  cluster-clean:
    desc: Remove stale cluster state if containers are gone
    internal: true
    status:
      - '! test -d {{.HOME}}/.talos/clusters/{{.CLUSTER_NAME}}'
    cmds:
      - rm -rf {{.HOME}}/.talos/clusters/{{.CLUSTER_NAME}}

  run:
    desc: Run the CLI (pass args with --)
    cmds:
      - uv run kube-autotuner {{.CLI_ARGS}}

  hooks:install:
    desc: Install lefthook git hooks
    cmds:
      - lefthook install

  completions:
    desc: Regenerate shell completions for bash, zsh, and fish
    deps: [sync]
    vars:
      DIR: .venv/completions
    sources:
      - pyproject.toml
      - src/**/*.py
    generates:
      - "{{.DIR}}/bash-completion/completions/kube-autotuner"
      - "{{.DIR}}/zsh/site-functions/_kube-autotuner"
      - "{{.DIR}}/fish/vendor_completions.d/kube-autotuner.fish"
    status:
      - test -s {{.DIR}}/bash-completion/completions/kube-autotuner
      - test -s {{.DIR}}/zsh/site-functions/_kube-autotuner
      - test -s {{.DIR}}/fish/vendor_completions.d/kube-autotuner.fish
    cmds:
      - mkdir -p {{.DIR}}/bash-completion/completions {{.DIR}}/fish/vendor_completions.d {{.DIR}}/zsh/site-functions
      - _KUBE_AUTOTUNER_COMPLETE=source_bash uv run kube-autotuner > {{.DIR}}/bash-completion/completions/kube-autotuner
      - _KUBE_AUTOTUNER_COMPLETE=source_zsh uv run kube-autotuner > {{.DIR}}/zsh/site-functions/_kube-autotuner
      - _KUBE_AUTOTUNER_COMPLETE=source_fish uv run kube-autotuner > {{.DIR}}/fish/vendor_completions.d/kube-autotuner.fish
