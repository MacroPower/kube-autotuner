# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

tasks:
  default:
    cmd: task -l

  bootstrap:
    desc: Prepare the devshell (sync venv + generate completions)
    deps: [completions]

  sync:
    desc: Sync the uv-managed virtualenv
    sources:
      - pyproject.toml
      - uv.lock
    generates:
      - .venv/pyvenv.cfg
    cmds:
      - uv sync --quiet

  fmt:
    desc: Format the codebase with ruff
    cmds:
      - ruff format .

  lint:
    desc: Lint with ruff (auto-fix)
    cmds:
      - ruff check --fix .

  lint:check:
    desc: Lint without auto-fix (CI mode)
    cmds:
      - ruff check .
      - ruff format --check .

  typecheck:
    desc: Type-check with ty
    cmds:
      - ty check

  test:
    desc: Run the pytest suite
    cmds:
      - uv run pytest

  test:integration:
    desc: Run integration tests (requires a live Talos/k8s cluster)
    cmds:
      - uv run pytest -m integration

  run:
    desc: Run the CLI (pass args with --)
    cmds:
      - uv run kube-autotuner {{.CLI_ARGS}}

  hooks:install:
    desc: Install lefthook git hooks
    cmds:
      - lefthook install

  completions:
    desc: Regenerate shell completions for bash, zsh, and fish
    deps: [sync]
    vars:
      DIR: .venv/completions
    sources:
      - pyproject.toml
      - src/**/*.py
    generates:
      - "{{.DIR}}/bash-completion/completions/kube-autotuner"
      - "{{.DIR}}/zsh/site-functions/_kube-autotuner"
      - "{{.DIR}}/fish/vendor_completions.d/kube-autotuner.fish"
    cmds:
      - mkdir -p {{.DIR}}/bash-completion/completions {{.DIR}}/fish/vendor_completions.d {{.DIR}}/zsh/site-functions
      - _KUBE_AUTOTUNER_COMPLETE=source_bash kube-autotuner > {{.DIR}}/bash-completion/completions/kube-autotuner
      - _KUBE_AUTOTUNER_COMPLETE=source_zsh kube-autotuner > {{.DIR}}/zsh/site-functions/_kube-autotuner
      - _KUBE_AUTOTUNER_COMPLETE=source_fish kube-autotuner > {{.DIR}}/fish/vendor_completions.d/kube-autotuner.fish
